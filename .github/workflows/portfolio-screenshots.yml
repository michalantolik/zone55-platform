############################################################################################
# Generates representative portfolio screenshots from the deployed application.             #
############################################################################################

name: Portfolio screenshots

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: Application URL used for screenshot generation
        required: false
        default: https://zone55.dev
  workflow_run:
    workflows:
      - Azure seed content
    types:
      - completed

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  SCREENSHOT_PROJECT: src/BlogPlatform/BlogPlatform.PortfolioScreenshots/BlogPlatform.PortfolioScreenshots.csproj
  CONFIGURATION: Release

jobs:
  capture-screenshots:
    name: Capture portfolio screenshots
    if: >
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore screenshot project
        run: dotnet restore ${{ env.SCREENSHOT_PROJECT }}

      - name: Build screenshot project
        run: dotnet build ${{ env.SCREENSHOT_PROJECT }} --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Install Playwright browsers
        run: pwsh src/BlogPlatform/BlogPlatform.PortfolioScreenshots/bin/${{ env.CONFIGURATION }}/net10.0/playwright.ps1 install --with-deps chromium

      - name: Capture screenshots
        env:
          APP_URL: ${{ github.event.inputs.app_url || 'https://zone55.dev' }}
        run: dotnet test ${{ env.SCREENSHOT_PROJECT }} --configuration ${{ env.CONFIGURATION }} --no-build --logger trx

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-screenshots
          path: src/BlogPlatform/BlogPlatform.PortfolioScreenshots/bin/${{ env.CONFIGURATION }}/net10.0/portfolio-screenshots
