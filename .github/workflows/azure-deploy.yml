name: Azure deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-deploy
  cancel-in-progress: false

env:
  DOTNET_VERSION: 10.0.x
  TERRAFORM_VERSION: 1.13.5
  CONFIGURATION: Release
  SOLUTION_PATH: src/BlogPlatform/BlogPlatform.slnx

  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  deploy:
    name: Deploy BlogPlatform to Azure
    runs-on: ubuntu-latest
    environment: azure-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate required deployment secrets
        shell: bash
        run: |
          missing=0

          check_secret() {
            local name="$1"
            local value="$2"

            if [ -z "$value" ]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          }

          check_secret "AZURE_CLIENT_ID" "${{ secrets.AZURE_CLIENT_ID }}"
          check_secret "AZURE_TENANT_ID" "${{ secrets.AZURE_TENANT_ID }}"
          check_secret "AZURE_SUBSCRIPTION_ID" "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          check_secret "TF_STATE_RESOURCE_GROUP_NAME" "${{ secrets.TF_STATE_RESOURCE_GROUP_NAME }}"
          check_secret "TF_STATE_STORAGE_ACCOUNT_NAME" "${{ secrets.TF_STATE_STORAGE_ACCOUNT_NAME }}"
          check_secret "TF_STATE_CONTAINER_NAME" "${{ secrets.TF_STATE_CONTAINER_NAME }}"
          check_secret "TF_STATE_KEY" "${{ secrets.TF_STATE_KEY }}"

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Read Terraform outputs
        working-directory: infra
        shell: bash
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER_NAME }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}"

          echo "RESOURCE_GROUP_NAME=$(terraform output -raw resource_group_name)" >> "$GITHUB_ENV"
          echo "API_APP_NAME=$(terraform output -raw api_app_service_name)" >> "$GITHUB_ENV"
          echo "CMS_APP_NAME=$(terraform output -raw cms_app_service_name)" >> "$GITHUB_ENV"
          echo "STATIC_WEB_APP_NAME=$(terraform output -raw static_web_app_name)" >> "$GITHUB_ENV"
          echo "API_PUBLIC_URL=$(terraform output -raw api_app_service_url)/" >> "$GITHUB_ENV"
          echo "CMS_PUBLIC_URL=$(terraform output -raw cms_app_service_url)/" >> "$GITHUB_ENV"
          echo "APP_PUBLIC_URL=$(terraform output -raw static_web_app_url)/" >> "$GITHUB_ENV"

      - name: Validate Terraform output values
        shell: bash
        run: |
          test -n "${RESOURCE_GROUP_NAME}"
          test -n "${API_APP_NAME}"
          test -n "${CMS_APP_NAME}"
          test -n "${STATIC_WEB_APP_NAME}"
          test -n "${API_PUBLIC_URL}"
          test -n "${CMS_PUBLIC_URL}"
          test -n "${APP_PUBLIC_URL}"

          echo "API: ${API_PUBLIC_URL}"
          echo "CMS: ${CMS_PUBLIC_URL}"
          echo "APP: ${APP_PUBLIC_URL}"

      - name: Show Azure resource summary
        shell: bash
        run: |
          az webapp show \
            --name "${API_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --query "{name:name,state:state,hostNames:enabledHostNames,healthCheckPath:siteConfig.healthCheckPath}" \
            --output table

          az webapp show \
            --name "${CMS_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --query "{name:name,state:state,hostNames:enabledHostNames,healthCheckPath:siteConfig.healthCheckPath}" \
            --output table

          az staticwebapp show \
            --name "${STATIC_WEB_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --query "{name:name,defaultHostname:defaultHostname}" \
            --output table

      - name: Configure Blazor production API URL
        shell: bash
        run: |
          cat > src/BlogPlatform/BlogPlatform.App/wwwroot/appsettings.Production.json <<EOF
          {
            "Api": {
              "BaseUrl": "${API_PUBLIC_URL}"
            },

            "Features": {
              "ShowPlantUmlSource": false,
              "EnableBlogDisplayMode": "DotnetStandard",
              "EnableStickyTopNav": true,
              "ExtensiveStandardArticleCard": false,
              "CollapseArticleCardTagByDefault": true,
              "DisplayStepIcons": false
            },

            "LearningPath": {
              "ArticlesPerStepPage": 3
            }
          }
          EOF

          cat src/BlogPlatform/BlogPlatform.App/wwwroot/appsettings.Production.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Test solution
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal

      - name: Publish API
        run: >
          dotnet publish src/BlogPlatform/BlogPlatform.Api/BlogPlatform.Api.csproj
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --output ./artifacts/api

      - name: Publish CMS
        run: >
          dotnet publish src/BlogPlatform/BlogPlatform.Cms/BlogPlatform.Cms.csproj
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --output ./artifacts/cms

      - name: Publish Blazor App
        run: >
          dotnet publish src/BlogPlatform/BlogPlatform.App/BlogPlatform.App.csproj
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --output ./artifacts/app

      - name: Deploy CMS App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.CMS_APP_NAME }}
          package: ./artifacts/cms

      - name: Deploy API App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.API_APP_NAME }}
          package: ./artifacts/api

      - name: Restart App Services after deployment
        shell: bash
        run: |
          az webapp restart \
            --name "${CMS_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP_NAME}"

          az webapp restart \
            --name "${API_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP_NAME}"

      - name: Get Static Web Apps deployment token
        shell: bash
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${STATIC_WEB_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --query "properties.apiKey" \
            --output tsv)

          echo "::add-mask::$TOKEN"
          echo "AZURE_STATIC_WEB_APPS_API_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Deploy Blazor App to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ./artifacts/app/wwwroot
          api_location: ""
          output_location: ""
          skip_app_build: true

      - name: Check CMS live health
        shell: bash
        run: |
          bash .github/workflows/scripts/check-url.sh "${CMS_PUBLIC_URL}health/live" "CMS live health"

      - name: Check CMS ready health
        shell: bash
        run: |
          bash .github/workflows/scripts/check-url.sh "${CMS_PUBLIC_URL}health/ready" "CMS ready health"

      - name: Check API live health
        shell: bash
        run: |
          bash .github/workflows/scripts/check-url.sh "${API_PUBLIC_URL}health/live" "API live health"

      - name: Check API ready health
        shell: bash
        run: |
          bash .github/workflows/scripts/check-url.sh "${API_PUBLIC_URL}health/ready" "API ready health"

      - name: Check Blazor Static Web App
        shell: bash
        run: |
          bash .github/workflows/scripts/check-url.sh "${APP_PUBLIC_URL}" "Blazor Static Web App"

      - name: Collect App Service diagnostics on failure
        if: failure()
        shell: bash
        run: |
          echo "## API App Service settings"
          az webapp config appsettings list \
            --name "${API_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --query "[].name" \
            --output table || true

          echo "## CMS App Service settings"
          az webapp config appsettings list \
            --name "${CMS_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --query "[].name" \
            --output table || true

          echo "## API App Service state"
          az webapp show \
            --name "${API_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --query "{name:name,state:state,hostNames:enabledHostNames,defaultHostName:defaultHostName}" \
            --output json || true

          echo "## CMS App Service state"
          az webapp show \
            --name "${CMS_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --query "{name:name,state:state,hostNames:enabledHostNames,defaultHostName:defaultHostName}" \
            --output json || true

          echo "## Recent API logs"
          az webapp log tail \
            --name "${API_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --timeout 60 || true

          echo "## Recent CMS logs"
          az webapp log tail \
            --name "${CMS_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP_NAME}" \
            --timeout 60 || true

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Azure deployment summary"
            echo ""
            echo "| Component | URL |"
            echo "|---|---|"
            echo "| API | ${API_PUBLIC_URL} |"
            echo "| CMS | ${CMS_PUBLIC_URL} |"
            echo "| Blazor App | ${APP_PUBLIC_URL} |"
            echo ""
            echo "Smoke checks completed successfully."
          } >> "$GITHUB_STEP_SUMMARY"
 