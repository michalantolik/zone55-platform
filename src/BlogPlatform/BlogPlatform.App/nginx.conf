server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Compression ---
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm;

    # --- WASM MIME type (required for Blazor) ---
    # Nginx <1.23 doesn't include application/wasm by default
    types {
        application/wasm                            wasm;
        text/html                                   html htm;
        text/css                                    css;
        application/javascript                      js;
        application/json                            json;
        image/svg+xml                               svg svgz;
        application/octet-stream                    dat blat;
    }

    # --- Cache static Blazor framework files aggressively ---
    location /_framework/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- Cache static assets ---
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # --- SPA fallback: all unmatched routes serve index.html ---
    # This is what enables Blazor client-side routing to work correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
