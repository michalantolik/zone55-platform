<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>.NET Backend & Cloud Engineering Notes</title>
    <base href="/" />

    <link rel="icon" type="image/png" href="icon-192.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/themes/blog-theme-engineering-blue.css" />
    <link rel="stylesheet" href="css/themes/blog-theme-engineering-blue-dark.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/loading-state.css" />
    <link rel="stylesheet" href="css/learning-path.css" />
    <link rel="stylesheet" href="css/theme-selector.css" />
    <link rel="stylesheet" href="css/dotnet-standard-navigation.css" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-card">
                <div class="loading-logo">&lt;/&gt;</div>

                <div class="loading-orbits">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <h1>Preparing your engineering notes</h1>
                <p>Loading .NET, cloud, architecture and project content...</p>

                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="js/blog-theme.js"></script>
    <script src="js/sticky-top-nav.js"></script>
    <script src="js/blog-platform-preview.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

        const getRawThemeValue = (name) =>
            getComputedStyle(document.documentElement).getPropertyValue(name).trim();

        const resolveCssVariableValue = (value, depth = 0) => {
            if (!value || depth > 10) {
                return value;
            }

            const variableMatch = value.match(/^var\((--[^,\s)]+)(?:,\s*([^)]+))?\)$/);

            if (!variableMatch) {
                return value;
            }

            const variableName = variableMatch[1];
            const fallbackValue = variableMatch[2]?.trim() ?? '';
            const resolvedValue = getRawThemeValue(variableName);

            return resolveCssVariableValue(resolvedValue || fallbackValue, depth + 1);
        };

        const normalizeCssColor = (value, fallback) => {
            const resolvedValue = resolveCssVariableValue(value).trim();

            if (/^#[0-9a-f]{3,8}$/i.test(resolvedValue) || /^rgb(a)?\(/i.test(resolvedValue)) {
                return resolvedValue;
            }

            return fallback;
        };

        const getThemeValue = (name) =>
            resolveCssVariableValue(getRawThemeValue(name));

        const initializeMermaid = () => {
            mermaid.initialize({
                startOnLoad: false,
                theme: 'base',
                securityLevel: 'loose',
                flowchart: {
                    htmlLabels: true,
                    curve: 'basis'
                },
                themeVariables: {
                    background: getThemeValue('--diagram-mermaid-bg'),

                    mainBkg: getThemeValue('--diagram-mermaid-node-bg'),
                    secondBkg: getThemeValue('--diagram-mermaid-node-bg'),
                    primaryColor: getThemeValue('--diagram-mermaid-node-bg'),
                    primaryBorderColor: getThemeValue('--diagram-mermaid-node-border'),

                    primaryTextColor: getThemeValue('--diagram-mermaid-node-text'),
                    nodeTextColor: getThemeValue('--diagram-mermaid-node-text'),
                    textColor: getThemeValue('--diagram-mermaid-node-text'),
                    labelTextColor: getThemeValue('--diagram-mermaid-node-text'),
                    darkTextColor: getThemeValue('--diagram-mermaid-node-text'),
                    tertiaryTextColor: getThemeValue('--diagram-mermaid-node-text'),

                    lineColor: getThemeValue('--diagram-mermaid-line'),
                    arrowheadColor: getThemeValue('--diagram-mermaid-line'),

                    fontFamily: getThemeValue('--diagram-mermaid-font-family')
                }
            });
        };

        initializeMermaid();

        window.blogPlatformArticle = {
            getThemeValue,

            refreshDiagramTheme: async () => {
                initializeMermaid();
                await window.blogPlatformArticle.renderDiagrams();
            },

            copyToClipboard: async (text) => {
                await navigator.clipboard.writeText(text);
            },

            renderDiagrams: async () => {
                const diagrams = document.querySelectorAll('.mermaid');

                for (const diagram of diagrams) {
                    diagram.removeAttribute('data-processed');
                }

                if (diagrams.length > 0) {
                    await mermaid.run({
                        nodes: diagrams
                    });
                }
            },

            getPlantUmlThemeValues: () => ({
                line: normalizeCssColor(getThemeValue('--diagram-plantuml-line'), '#a7b4c8'),
                nodeText: normalizeCssColor(getThemeValue('--diagram-plantuml-node-text'), '#E5E7EB'),
                nodeBorder: normalizeCssColor(getThemeValue('--diagram-plantuml-node-border'), '#7d8ca3'),
                nodeBg: normalizeCssColor(getThemeValue('--diagram-plantuml-node-bg'), '#374151'),
                fontFamily: getThemeValue('--diagram-plantuml-font-family')
            })
        };
    </script>

</body>
</html>
