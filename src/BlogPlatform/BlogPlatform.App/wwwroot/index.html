<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>.NET Backend & Cloud Engineering Notes</title>
    <base href="/" />

    <link rel="icon" type="image/png" href="icon-192.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/themes/blog-theme-engineering-blue.css" />
    <link rel="stylesheet" href="css/themes/blog-theme-engineering-blue-dark.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/loading-state.css" />
    <link rel="stylesheet" href="css/learning-path.css" />
    <link rel="stylesheet" href="css/theme-selector.css" />
    <link rel="stylesheet" href="css/dotnet-standard-navigation.css" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-card">
                <div class="loading-logo">&lt;/&gt;</div>

                <div class="loading-orbits">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <h1>Preparing your engineering notes</h1>
                <p>Loading .NET, cloud, architecture and project content...</p>

                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="js/blog-theme.js"></script>
    <script src="js/sticky-top-nav.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

        const getThemeValue = (name) =>
            getComputedStyle(document.documentElement).getPropertyValue(name).trim();

        const initializeMermaid = () => {
            mermaid.initialize({
                startOnLoad: false,
                theme: 'base',
                securityLevel: 'loose',
                flowchart: {
                    htmlLabels: true,
                    curve: 'basis'
                },
                themeVariables: {
                    background: getThemeValue('--diagram-mermaid-bg'),

                    mainBkg: getThemeValue('--diagram-mermaid-node-bg'),
                    secondBkg: getThemeValue('--diagram-mermaid-node-bg'),
                    primaryColor: getThemeValue('--diagram-mermaid-node-bg'),
                    primaryBorderColor: getThemeValue('--diagram-mermaid-node-border'),

                    primaryTextColor: getThemeValue('--diagram-mermaid-node-text'),
                    nodeTextColor: getThemeValue('--diagram-mermaid-node-text'),
                    textColor: getThemeValue('--diagram-mermaid-node-text'),
                    labelTextColor: getThemeValue('--diagram-mermaid-node-text'),
                    darkTextColor: getThemeValue('--diagram-mermaid-node-text'),
                    tertiaryTextColor: getThemeValue('--diagram-mermaid-node-text'),

                    lineColor: getThemeValue('--diagram-mermaid-line'),
                    arrowheadColor: getThemeValue('--diagram-mermaid-line'),

                    fontFamily: getThemeValue('--diagram-mermaid-font-family')
                }
            });
        };

        initializeMermaid();

        window.blogPlatformArticle = {
            getThemeValue,

            refreshDiagramTheme: async () => {
                initializeMermaid();
                await window.blogPlatformArticle.renderDiagrams();
            },

            copyToClipboard: async (text) => {
                await navigator.clipboard.writeText(text);
            },

            renderDiagrams: async () => {
                const diagrams = document.querySelectorAll('.mermaid');

                for (const diagram of diagrams) {
                    diagram.removeAttribute('data-processed');
                }

                if (diagrams.length > 0) {
                    await mermaid.run({
                        nodes: diagrams
                    });
                }
            }
        };

        window.blogPlatformPreview = {
            dotNetObject: null,
            registered: false,

            register: (dotNetObject) => {
                window.blogPlatformPreview.dotNetObject = dotNetObject;

                if (window.blogPlatformPreview.registered) {
                    window.blogPlatformPreview.log('WARNING', 'register called more than once. Existing message listener is kept.');
                    return;
                }

                window.blogPlatformPreview.registered = true;
                window.blogPlatformPreview.log('INFORMATION', 'Preview message listener registered.');

                window.addEventListener('message', async (event) => {
                    if (!event.data) {
                        window.blogPlatformPreview.log('WARNING', `Ignored message with empty data. Origin=${event.origin}`);
                        return;
                    }

                    if (event.data.type !== 'BLOG_ARTICLE_PREVIEW') {
                        window.blogPlatformPreview.log('DEBUG', `Ignored message with unsupported type=${event.data.type}; Origin=${event.origin}`);
                        return;
                    }

                    const sequence = event.data.sequence ?? 0;
                    const article = event.data.article;
                    const title = article?.title ?? '';
                    const json = JSON.stringify(article);

                    window.blogPlatformPreview.log(
                        'INFORMATION',
                        `Message received. Sequence=${sequence}; Origin=${event.origin}; Title=${title}; JsonLength=${json.length}`);

                    try {
                        await dotNetObject.invokeMethodAsync(
                            'LoadPreviewArticle',
                            json,
                            sequence);

                        window.blogPlatformPreview.log(
                            'INFORMATION',
                            `LoadPreviewArticle completed. Sequence=${sequence}; Title=${title}`);
                    } catch (error) {
                        window.blogPlatformPreview.log(
                            'ERROR',
                            `LoadPreviewArticle failed. Sequence=${sequence}; Error=${error}`);
                    }
                });
            },

            sendAck: (sequence, title, blockCount) => {
                window.blogPlatformPreview.log(
                    'INFORMATION',
                    `Sending ACK to parent. Sequence=${sequence}; Title=${title}; Blocks=${blockCount}`);

                window.parent.postMessage({
                    type: 'BLOG_ARTICLE_PREVIEW_ACK',
                    sequence,
                    title,
                    blockCount
                }, '*');
            },

            log: async (level, message) => {
                console.log(`[LIVE_PREVIEW] ${level}: ${message}`);

                const dotNetObject = window.blogPlatformPreview.dotNetObject;

                if (!dotNetObject) {
                    return;
                }

                try {
                    await dotNetObject.invokeMethodAsync(
                        'LogPreviewDiagnostic',
                        level,
                        message);
                } catch {
                    console.warn('[LIVE_PREVIEW] Failed to send APP preview diagnostic.');
                }
            }
        };
    </script>

</body>
</html>
